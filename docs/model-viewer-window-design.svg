<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <title>Model Viewer — просмотр модели (после загрузки)</title>
  <defs>
    <linearGradient id="panelLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <linearGradient id="canvasBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2226"/>
      <stop offset="100%" stop-color="#252a30"/>
    </linearGradient>
    <linearGradient id="buttonBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#353535"/>
    </linearGradient>
    <linearGradient id="modelFill" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3a4a5a"/>
      <stop offset="50%" stop-color="#4a5a6e"/>
      <stop offset="100%" stop-color="#5a6a82"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#252d35" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#252525"/>

  <!-- ========== LEFT PANEL (#panel-left) — после загрузки ========== -->
  <g id="panel-left">
    <rect x="0" y="0" width="310" height="700" fill="url(#panelLeft)" filter="url(#shadow)"/>
    <rect x="278" y="0" width="32" height="700" fill="#2d2d2d"/>
    <rect x="278" y="0" width="32" height="32" fill="#404040" rx="2"/>
    <!-- SCENE -->
    <rect x="8" y="12" width="260" height="24" fill="#293538" rx="2"/>
    <text x="18" y="28" fill="#FAD961" font-family="sans-serif" font-size="11" font-weight="600">SCENE</text>
    <line x1="12" y1="44" x2="268" y2="44" stroke="#404040" stroke-width="1"/>
    <text x="18" y="58" fill="#aaa" font-size="10">Filename</text><text x="260" y="58" text-anchor="end" fill="#888" font-size="10">model.glb</text>
    <text x="18" y="74" fill="#aaa" font-size="10">Meshes</text><text x="260" y="74" text-anchor="end" fill="#888" font-size="10">12</text>
    <text x="18" y="90" fill="#aaa" font-size="10">Materials</text><text x="260" y="90" text-anchor="end" fill="#888" font-size="10">8</text>
    <text x="18" y="106" fill="#aaa" font-size="10">Verts</text><text x="260" y="106" text-anchor="end" fill="#888" font-size="10">45.2K</text>
    <text x="18" y="122" fill="#aaa" font-size="10">Load time</text><text x="260" y="122" text-anchor="end" fill="#888" font-size="10">320ms</text>
    <line x1="12" y1="138" x2="268" y2="138" stroke="#404040" stroke-width="1"/>
    <!-- HIERARCHY -->
    <rect x="8" y="150" width="260" height="24" fill="#293538" rx="2"/>
    <text x="18" y="166" fill="#FAD961" font-family="sans-serif" font-size="11" font-weight="600">HIERARCHY</text>
    <text x="22" y="188" fill="#ccc" font-size="10">Root</text>
    <text x="38" y="206" fill="#aaa" font-size="10">├ Mesh_01</text>
    <text x="38" y="222" fill="#e8c858" font-size="10">├ Mesh_02</text>
    <text x="38" y="238" fill="#aaa" font-size="10">└ Group_01</text>
    <text x="54" y="256" fill="#888" font-size="10">  ├ Part_A</text>
    <text x="54" y="272" fill="#888" font-size="10">  └ Part_B</text>
    <text x="155" y="400" text-anchor="middle" fill="#555" font-size="9">panel-left 310px</text>
  </g>

  <!-- ========== ОБЛАСТЬ ПРОСМОТРА МОДЕЛИ (#canvas-wrapper) ========== -->
  <g id="canvas-wrapper">
    <rect x="310" y="0" width="890" height="700" fill="url(#canvasBg)" stroke="#3a3a3a" stroke-width="1"/>
    <rect x="320" y="10" width="870" height="680" fill="url(#grid)" opacity="0.35"/>
    <!-- Условная 3D-модель (силуэт после загрузки) -->
    <g transform="translate(720 300) scale(1.2)">
      <!-- Основание -->
      <ellipse cx="0" cy="100" rx="90" ry="22" fill="#2a3540" opacity="0.9"/>
      <!-- Объём фигуры (упрощённая форма) -->
      <path d="M -50 -60 L 55 35 L 55 100 L -50 100 Z" fill="url(#modelFill)" stroke="#6a7a8a" stroke-width="1.2" opacity="0.95"/>
      <path d="M -50 -60 L -50 100 L 55 100 L 55 35 Z" fill="#3d4a58" stroke="#5a6a7a" stroke-width="1" opacity="0.9"/>
      <path d="M -50 -60 L 55 35 L 0 -20 Z" fill="#4a5a6c" stroke="#6a7a8a" stroke-width="1"/>
    </g>
    <text x="755" y="620" text-anchor="middle" fill="#3a3a3a" font-family="sans-serif" font-size="11">Просмотр модели — orbit / fly, двойной клик — фокус</text>
  </g>

  <!-- ========== Кнопки управления — внизу по центру (bottom: 20px, left: 50%, transform: translateX(-50%)) ========== -->
  <g id="popup-buttons-parent">
    <rect x="613" y="628" width="284" height="52" fill="rgba(0,0,0,0.45)" rx="6" stroke="#444" stroke-width="1"/>
    <rect x="623" y="638" width="40" height="40" fill="url(#buttonBg)" rx="4" stroke="#555"/>
    <rect x="671" y="638" width="40" height="40" fill="url(#buttonBg)" rx="4" stroke="#555"/>
    <rect x="719" y="638" width="40" height="40" fill="url(#buttonBg)" rx="4" stroke="#555"/>
    <rect x="767" y="638" width="40" height="40" fill="url(#buttonBg)" rx="4" stroke="#555"/>
    <rect x="815" y="638" width="40" height="40" fill="url(#buttonBg)" rx="4" stroke="#555"/>
    <rect x="863" y="638" width="40" height="40" fill="url(#buttonBg)" rx="4" stroke="#555"/>
    <text x="643" y="662" text-anchor="middle" fill="#888" font-size="8">▶</text>
    <text x="691" y="662" text-anchor="middle" fill="#888" font-size="8">📷</text>
    <text x="739" y="662" text-anchor="middle" fill="#888" font-size="8">☀</text>
    <text x="787" y="662" text-anchor="middle" fill="#888" font-size="8">💡</text>
    <text x="835" y="662" text-anchor="middle" fill="#888" font-size="8">⚙</text>
    <text x="883" y="662" text-anchor="middle" fill="#888" font-size="8">🔗</text>
    <text x="755" y="692" text-anchor="middle" fill="#555" font-size="9">anim  camera  sky  light  settings  view — по центру внизу</text>
  </g>

  <!-- Fullscreen — справа сверху (top: 20px, right: 20px) -->
  <g id="floating-top-parent">
    <rect x="1140" y="20" width="40" height="40" fill="url(#buttonBg)" rx="4" stroke="#555"/>
    <text x="1160" y="45" text-anchor="middle" fill="#888" font-size="10">⛶</text>
    <text x="1160" y="66" text-anchor="middle" fill="#444" font-size="8">fullscreen</text>
  </g>

  <!-- Orbit/Fly — справа внизу (bottom: 20px, right: 20px) -->
  <g id="floating-bottom-parent">
    <rect x="1140" y="640" width="40" height="40" fill="url(#buttonBg)" rx="4" stroke="#555"/>
    <text x="1160" y="665" text-anchor="middle" fill="#888" font-size="10">⊙</text>
    <text x="1160" y="686" text-anchor="middle" fill="#444" font-size="8">orbit/fly</text>
  </g>

  <!-- Launch AR — внизу слева (bottom: 20px, left: 20px), запуск AR / экспорт USDZ -->
  <g id="launch-ar-button">
    <rect x="330" y="640" width="40" height="40" fill="url(#buttonBg)" rx="4" stroke="#555"/>
    <text x="350" y="665" text-anchor="middle" fill="#888" font-size="10">AR</text>
    <text x="350" y="686" text-anchor="middle" fill="#444" font-size="8">Launch AR</text>
  </g>

  <!-- Панель выбранного узла (появляется при клике по иерархии) -->
  <g id="selected-node-panel">
    <rect x="320" y="520" width="260" height="160" fill="rgba(41,53,56,0.95)" rx="6" stroke="#444" stroke-width="1"/>
    <text x="450" y="542" text-anchor="middle" fill="#FAD961" font-family="sans-serif" font-size="11" font-weight="600">Selected Node</text>
    <line x1="328" y1="552" x2="568" y2="552" stroke="#404040" stroke-width="1"/>
    <text x="332" y="570" fill="#aaa" font-size="10">Name</text>
    <text x="568" y="570" text-anchor="end" fill="#ccc" font-size="10">Mesh_02</text>
    <text x="332" y="590" fill="#aaa" font-size="10">Position</text>
    <text x="568" y="590" text-anchor="end" fill="#888" font-size="10">0.00, 1.20, 0.00</text>
    <text x="332" y="610" fill="#aaa" font-size="10">Rotation</text>
    <text x="568" y="610" text-anchor="end" fill="#888" font-size="10">0, 0, 0</text>
    <text x="332" y="630" fill="#aaa" font-size="10">Scale</text>
    <text x="568" y="630" text-anchor="end" fill="#888" font-size="10">1.00, 1.00, 1.00</text>
    <text x="450" y="668" text-anchor="middle" fill="#555" font-size="8">selected-node-panel (при выборе в HIERARCHY)</text>
  </g>

  <!-- Dimensions -->
  <line x1="310" y1="688" x2="310" y2="700" stroke="#333" stroke-width="1"/>
  <line x1="1200" y1="688" x2="1200" y2="700" stroke="#333" stroke-width="1"/>
  <text x="155" y="698" text-anchor="middle" fill="#333" font-size="9">310px</text>
  <text x="755" y="698" text-anchor="middle" fill="#333" font-size="9">890px</text>
  <text x="600" y="698" text-anchor="middle" fill="#333" font-size="8">1200×700 — просмотр модели</text>
</svg>
