          - POST
        expiresAt:
          type: string
          format: date-time
        headers:
          type: object
          additionalProperties:
            type: string
        maxSizeBytes:
          type:
          - integer
          - 'null'
          format: int64
    RegisterMediaAssetRequest:
      type: object
      required:
      - assetDraftId
      - fileName
      - kind
      - format
      - checksum
      properties:
        assetDraftId:
          $ref: '#/components/schemas/H3DId'
        fileName:
          type: string
        kind:
          type: string
          enum:
          - web_model
          - source_model
          - point_cloud
          - texture
          - panorama
          - image_set
          - video
          - archive_package
          - annotation_layer
        format:
          type: string
          enum:
          - glb
          - gltf
          - obj
          - ply
          - e57
          - laz
          - las
          - jpg
          - png
          - exr
          - hdr
          - mp4
          - tiles3d
          - zip
          - json
          - other
        checksum:
          type: string
        download:
          $ref: '#/components/schemas/DownloadPolicy'
    ProcessingStatus:
      type: object
      required:
      - twinId
      - status
      properties:
        twinId:
          $ref: '#/components/schemas/H3DId'
        status:
          type: string
          enum:
          - queued
          - uploading
          - uploaded
          - processing
          - validating
          - ready
          - failed
          - published
        progress:
          type:
          - number
          - 'null'
          minimum: 0
          maximum: 1
        message:
          type:
          - string
          - 'null'
        updatedAt:
          type: string
          format: date-time
    DownloadUrlResponse:
      type: object
      required:
      - assetId
      - downloadUrl
      - expiresAt
      - checksum
      properties:
        assetId:
          $ref: '#/components/schemas/H3DId'
        downloadUrl:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        checksum:
          type: string
        license:
          type:
          - string
          - 'null'
    SearchResponse:
      type: object
      required:
      - items
      - total
      - limit
      - offset
      properties:
        items:
          type: array
          items:
            type: object
            required:
            - type
            - id
            - title
            properties:
              type:
                type: string
                enum:
                - object
                - twin
                - asset
              id:
                type: string
              title:
                type: string
              snippet:
                type:
                - string
                - 'null'
        total:
          type: integer
        limit:
          type: integer
          default: 20
        offset:
          type: integer
          default: 0
    DictionaryResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            type: object
            required:
            - id
            - label
            properties:
              id:
                type: string
              label:
                type: string
              description:
                type:
                - string
                - 'null'
    StorageLocation:
      type: object
      required:
      - provider
      - url
      properties:
        provider:
          type: string
          enum:
          - portal
          - museum_server
          - partner_storage
          - s3_compatible
          - cdn
          - archive
          - other
        serverId:
          type:
          - string
          - 'null'
        url:
          type: string
          format: uri
        accessUrlExpiresAt:
          type:
          - string
          - 'null'
          format: date-time
    H3DManifest:
      type: object
      required:
      - manifestVersion
      - object
      - twin
      - assets
      - viewer
      properties:
        manifestVersion:
          type: string
          example: '1.0'
        object:
          $ref: '#/components/schemas/CulturalObjectSummary'
        twin:
          $ref: '#/components/schemas/DigitalTwinSummary'
        assets:
          type: array
          items:
            $ref: '#/components/schemas/ManifestAsset'
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/Annotation'
        rights:
          $ref: '#/components/schemas/RightsStatement'
        viewer:
          $ref: '#/components/schemas/ViewerHint'
        viewerPolicy:
          $ref: '#/components/schemas/ViewerPolicy'
    CulturalObjectSummary:
      type: object
      required:
      - id
      - type
      - title
      properties:
        id:
          $ref: '#/components/schemas/H3DId'
        type:
          type: string
        crmClass:
          type: string
        title:
          type: string
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/ExternalIdentifier'
    DigitalTwinSummary:
      type: object
      required:
      - id
      - version
      - status
      properties:
        id:
          $ref: '#/components/schemas/H3DId'
        version:
          type: string
        status:
          type: string
        quality:
          $ref: '#/components/schemas/QualityProfile'
    ManifestAsset:
      type: object
      required:
      - id
      - role
      - format
      - url
      - checksum
      properties:
        id:
          $ref: '#/components/schemas/H3DId'
        role:
          type: string
          enum:
          - primary
          - web_preview
          - source
          - texture
          - thumbnail
          - annotation_layer
        format:
          type: string
        url:
          type: string
          format: uri
        checksum:
          type: string
        access:
          type: string
          enum:
          - public
          - signed_url
          - restricted
          - internal
    Annotation:
      type: object
      required:
      - id
      - type
      - title
      properties:
        id:
          type: string
        type:
          type: string
          enum:
          - poi
          - measurement
          - note
          - hotspot
        title:
          type: string
        description:
          type:
          - string
          - 'null'
        target:
          type: object
          additionalProperties: true
    ViewerHint:
      type: object
      required:
      - preferredPlayer
      - capabilities
      properties:
        preferredPlayer:
          type: string
          example: h3d-gltf-viewer
        fallbackПлееры:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/PlayerCapabilityName'
    ViewerPolicy:
      type: object
      description: Политика времени выполнения, вычисленная по роли, правам объекта, настройкам встройки и возможностям плеера.
      required:
      - allowedOrigins
      - commands
      properties:
        allowedOrigins:
          type: array
          description: Origins, от которых принимаются входящие postMessage-команды.
          items:
            type: string
          example:
          - https://heritage3d.example.ru
        targetOrigin:
          type: string
          description: Origin, который плеер использует для отправки событий родительскому окну.
          example: https://heritage3d.example.ru
        commands:
          type: object
          description: Карта разрешений по командам postMessage.
          additionalProperties:
            type: boolean
          example:
            player.loadManifest: true
            poi.focus: true
            poi.clear: true
            animation.seek: true
            annotation.create: false
            asset.download: false
        ui:
          $ref: '#/components/schemas/EmbedUiFlags'
        expiresAt:
          type:
          - string
          - 'null'
          format: date-time
    Player:
      type: object
      required:
      - id
      - name
      - baseUrl
      - status
      - trustLevel
      - allowedOrigins
      - capabilities
      - supportedFormats
      properties:
        id:
          type: string
          example: h3d-gltf-viewer
        name:
          type: string
          example: Heritage3D GLTF Viewer
        baseUrl:
          type: string
          format: uri
        status:
          type: string
          enum:
          - active
          - disabled
          - testing
          description: Для генерации iframe URL могут использоваться только плееры со статусом `active`.
        trustLevel:
          $ref: '#/components/schemas/PlayerTrustLevel'
        allowedOrigins:
          type: array
          description: Разрешенные browser origins для iframe, CORS и проверок postMessage.
          items:
            type: string
          example:
          - https://player-a.example.ru
        allowedFrameAncestors:
          type: array
          description: Origins портала или партнеров, которым разрешено встраивать этот плеер.
          items:
            type: string
          example:
          - https://heritage3d.example.ru
        health:
          type: string
          enum:
          - healthy
          - degraded
          - offline
          - unknown
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/PlayerCapabilityName'
        supportedFormats:
          type: array
          items:
            type: string
          example:
          - glb
          - gltf
        postMessageProtocol:
          type: string
          example: h3d.player/1.0
    PlayerTrustLevel:
      type: string
      enum:
      - first_party
      - trusted_partner
      - public_viewer
      description: '`first_party` is operated by the portal. `trusted_partner` is an approved institution or partner.

        `public_viewer` can receive only public manifests/assets.

        '
    PlayerEmbedPolicy:
      type: object
      required:
      - playerId
      - status
      - trustLevel
      - baseUrl
      - allowedOrigins
      - supportedFormats
      - capabilities
      - tokenRequired
      properties:
        playerId:
          type: string
        status:
          type: string
          enum:
          - active
          - disabled
          - testing
        trustLevel:
          $ref: '#/components/schemas/PlayerTrustLevel'
        baseUrl:
          type: string
          format: uri
        allowedOrigins:
          type: array
          items:
            type: string
        allowedFrameAncestors:
          type: array
          items:
            type: string
        supportedFormats:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/PlayerCapabilityName'
        tokenRequired:
          type: boolean
          description: true только если плееру нужен временный доступ к закрытым manifest/media URL.
        securityNotes:
          type: array
          items:
            type: string
    EmbedPresetName:
      type: string
      enum:
      - full
      - compact
      - minimal
    EmbedPreset:
      type: object
      required:
      - name
      - description
      - defaults
      properties:
        name:
          $ref: '#/components/schemas/EmbedPresetName'
        description:
          type: string
        defaults:
          $ref: '#/components/schemas/EmbedUiFlags'
    EmbedUiFlags:
      type: object
      description: 'UI flags currently supported by the viewer query string.

        Boolean values are encoded as `1` or `0` in generated iframe URLs.

        '
      properties:
        panel:
          type: boolean
          description: Показывать левую панель в режиме встройки.
        poi:
          type: boolean
          description: Включить отображение POI и навигацию по ним.
        tour:
          type: boolean
          description: Показывать верхнюю панель тура по POI.
        measure:
          type: boolean
          description: Включить интерфейс измерений.
        info:
          type: boolean
          description: Показывать кнопку/панель информации.
        modelInfo:
          type: boolean
          description: Показывать метаданные модели внутри панели информации.
        controls:
          type: boolean
          description: Показывать подсказки по управлению.
        fullscreen:
          type: boolean
          description: Показывать кнопку полноэкранного режима.
        fit:
          type: boolean
          description: Показывать кнопку вписать в кадр.
        reset:
          type: boolean
          description: Показывать кнопку сброса камеры.
    CreateEmbedRequest:
      type: object
      properties:
        playerId:
          type: string
          description: Опциональный предпочитаемый плеер из allowlist портала. Произвольные URL плеера не принимаются.
          example: h3d-gltf-viewer
        tokenMode:
          type: string
          enum:
          - none
          - signed_embed_token
          - signed_asset_urls
          default: none
          description: Режим токена, выбранный порталом. Для публичных встраиваний обычно используется `none`.
        manifestUrl:
          type: string
          format: uri
          description: Опциональный явный manifest URL. Если не указан, портал использует `/api/v1/twins/{twinId}/manifest`.
        assetUrl:
          type: string
          format: uri
          description: Опциональный прямой GLB/GLTF URL для legacy-плееров, использующих `load`.
        preset:
          $ref: '#/components/schemas/EmbedPresetName'
        language:
          type: string
          enum:
          - ru
          - en
          - zh
          default: ru
        autoplay:
          type: boolean
          default: true
        ui:
          $ref: '#/components/schemas/EmbedUiFlags'
        width:
          type: integer
          minimum: 320
          default: 960
        height:
          type: integer
          minimum: 240
          default: 640
        title:
          type: string
          default: 3D Viewer
        allow:
          type: array
          description: Разрешения iframe в атрибуте allow.
          items:
            type: string
          default:
          - autoplay
          - fullscreen
          - xr-spatial-tracking
          - web-share
        referrerPolicy:
          type: string
          enum:
          - no-referrer
          - no-referrer-when-downgrade
          - origin
          - origin-when-cross-origin
          - same-origin
          - strict-origin
          - strict-origin-when-cross-origin
          - unsafe-url
          default: strict-origin-when-cross-origin
    EmbedUrlResponse:
      type: object
      required:
      - twinId
      - playerId
      - manifestUrl
      - iframeUrl
      - iframeHtml
      - options
      - playerPolicy
      properties:
        twinId:
          $ref: '#/components/schemas/H3DId'
        playerId:
          type: string
        manifestUrl:
          type: string
          format: uri
        iframeUrl:
          type: string
          format: uri
          description: Viewer URL со сформированными query-параметрами.
        iframeHtml:
          type: string
          description: Готовый HTML-код iframe.
        options:
          $ref: '#/components/schemas/CreateEmbedRequest'
        playerPolicy:
          $ref: '#/components/schemas/PlayerEmbedPolicy'
        embedToken:
          type:
          - string
          - 'null'
          description: Опциональный короткоживущий токен. Для публичной встройки без закрытых данных не передается.
        expiresAt:
          type:
          - string
          - 'null'
          format: date-time
        query:
          type: object
          description: Точные query-параметры, из которых собран iframe URL.
          additionalProperties:
            type: string
    PlayerCapabilities:
      type: object
      required:
      - playerId
      - protocolVersion
      - capabilities
      - supportedFormats
      properties:
        playerId:
          type: string
        protocolVersion:
          type: string
          example: '1.0'
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/PlayerCapabilityName'
        supportedFormats:
          type: array
          items:
            type: string
    PlayerCapabilityName:
      type: string
      enum:
      - camera
      - poi.read
      - poi.navigate
      - annotations.read
      - annotations.write
      - measurements
      - animation
      - selection
      - screenshots
      - fullscreen
      - theme
      - language
    PlayerMessagingProtocol:
      type: object
      required:
      - protocol
      - version
      - commands
      - events
      - legacy
      properties:
        protocol:
          type: string
          const: h3d.player
        version:
          type: string
          example: '1.0'
        commands:
          type: array
          items:
            type: string
          example:
          - player.loadManifest
          - poi.focus
          - poi.clear
          - poi.next
          - poi.previous
          - animation.seek
          - animation.play
          - animation.pause
        events:
          type: array
          items:
            type: string
          example:
          - player.ready
          - player.loaded
          - player.error
          - poi.selected
          - poi.cleared
          - animation.time
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/PlayerCapabilityName'
        legacy:
          type: object
          description: Текущие сообщения model-viewer, поддерживаемые без обертки `h3d.player`.
          properties:
            commands:
              type: array
              items:
                type: string
              example:
              - focus-poi
              - open-poi
              - clear-poi
              - next-poi
              - prev-poi
              - seek-animation
              - play-animation
              - pause-animation
              - freeze-animation
            events:
              type: array
              items:
                type: string
              example:
              - poi-selected
              - poi-cleared
              - animation-time
    PostMessageEnvelope:
      type: object
      required:
      - protocol
      - version
      - type
      - id
      - name
      - payload
      description: Предлагаемая стандартная обертка для будущих сообщений iframe-плееров.
      properties:
        protocol:
          type: string
          const: h3d.player
        version:
          type: string
          example: '1.0'
        type:
          type: string
          enum:
          - command
          - event
          - request
          - response
          - error
        id:
          type: string
          description: Correlation ID, сформированный клиентом.
          example: msg-001
        name:
          type: string
          example: poi.focus
        payload:
          type: object
          additionalProperties: true
        timestamp:
          type:
          - string
          - 'null'
          format: date-time
    PlayerLoadManifestCommand:
      allOf:
      - $ref: '#/components/schemas/PostMessageEnvelope'
      - type: object
        properties:
          type:
            const: command
          name:
            const: player.loadManifest
          payload:
            type: object
            required:
            - manifestUrl
            properties:
              manifestUrl:
                type: string
                format: uri
    PoiFocusCommand:
      allOf:
      - $ref: '#/components/schemas/PostMessageEnvelope'
      - type: object
        properties:
          type:
            const: command
          name:
            const: poi.focus
          payload:
            type: object
            required:
            - id
            properties:
              id:
                type: string
    AnimationSeekCommand:
      allOf:
      - $ref: '#/components/schemas/PostMessageEnvelope'
      - type: object
        properties:
          type:
            const: command
          name:
            const: animation.seek
          payload:
            type: object
            properties:
              clip:
                type:
                - string
                - 'null'
              time:
                type:
                - number
                - 'null'
              frame:
                type:
                - number
                - 'null'
              fps:
                type: number
                default: 24
    PlayerReadyEvent:
      allOf:
      - $ref: '#/components/schemas/PostMessageEnvelope'
      - type: object
        properties:
          type:
            const: event
          name:
            const: player.ready
          payload:
            type: object
            required:
            - playerId
            - protocolVersion
            - capabilities
            properties:
              playerId:
                type: string
              protocolVersion:
                type: string
              capabilities:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerCapabilityName'
    PoiSelectedEvent:
      allOf:
      - $ref: '#/components/schemas/PostMessageEnvelope'
      - type: object
        properties:
          type:
            const: event
          name:
            const: poi.selected
          payload:
            $ref: '#/components/schemas/PoiPayload'
    PoiPayload:
      type: object
      required:
      - id
      properties:
        id:
          type: string
        number:
          type:
          - integer
          - 'null'
        title:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        color:
          type:
          - string
          - 'null'
          example: '#000000'
    AnimationTimeEvent:
      allOf:
      - $ref: '#/components/schemas/PostMessageEnvelope'
      - type: object
        properties:
          type:
            const: event
          name:
            const: animation.time
          payload:
            type: object
            required:
            - time
            - frame
            - fps
            - duration
            - progress
            properties:
              clip:
                type:
                - string
                - 'null'
              time:
                type: number
              frame:
                type: integer
              fps:
                type: number
              duration:
                type: number
              progress:
                type: number
    LegacyFocusPoiCommand:
      type: object
      required:
      - type
      - id
      description: Текущая команда model-viewer, принимаемая без стандартной обертки.
      properties:
        type:
          type: string
          enum:
          - focus-poi
          - open-poi
        id:
          type: string
          example: poi-1
    LegacyAnimationCommand:
      type: object
      required:
      - type
      description: Текущая animation-команда model-viewer, принимаемая без стандартной обертки.
      properties:
        type:
          type: string
          enum:
          - seek-animation
          - play-animation
          - pause-animation
          - freeze-animation
        clip:
          type:
          - string
          - 'null'
        time:
          type:
          - number
          - 'null'
        frame:
          type:
          - integer
          - 'null'
        fps:
          type: number
          default: 24
