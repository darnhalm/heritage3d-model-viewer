    AccessControlModel:
      summary: Ролевая модель портала и права доступа.
      value:
        roles:
        - role: anonymous
          description: Публичный просмотр опубликованных объектов и manifest для публичных assets.
          permissions:
          - objects:read:published
          - twins:read:published
          - manifests:read:published
          - assets:read:public
          - embeds:create:public
          - playerMessaging:protocol:read
        - role: user
          description: Авторизованный пользователь, личные подборки и расширенные публичные сценарии.
          permissions:
          - objects:read:published
          - twins:read:published
          - manifests:read:published
          - assets:read:public
          - embeds:create:public
          - measurements:create
        - role: contributor
          description: Автор или организация, загружающая материалы и управляющая своими черновиками.
          permissions:
          - objects:create:draft
          - objects:update:ownDraft
          - twins:create
          - twins:update:ownDraft
          - assets:create
          - moderation:submit
        - role: institution_admin
          description: Администратор учреждения, управляющий объектами и авторами своей организации.
          permissions:
          - objects:update:institution
          - twins:update:institution
          - users:manage:institution
          - assets:read:restricted
        - role: moderator
          description: Проверка качества, прав, метаданных, публикация и отклонение материалов.
          permissions:
          - moderation:review
          - moderation:approve
          - moderation:reject
          - moderation:publish
          - assets:read:restricted
        - role: admin
          description: Полное управление порталом, плеерами, хранилищами, справочниками и пользователями.
          permissions:
          - '*'
        - role: system
          description: Машинный доступ для музейных АИС, реестров, синхронизаций и мониторинга.
          permissions:
          - integrations:sync
          - assets:healthcheck
          - objects:read:restricted
          - twins:read:restricted
        endpointRules:
        - operationId: getCulturalObject
          roles:
          - anonymous
          - user
          - contributor
          - institution_admin
          - moderator
          - admin
          - system
          permissions:
          - objects:read:published
          - objects:read:restricted
        - operationId: getDigitalTwinManifest
          roles:
          - anonymous
          - user
          - contributor
          - institution_admin
          - moderator
          - admin
          - system
          permissions:
          - manifests:read:published
          - manifests:read:restricted
        - operationId: createTwinEmbed
          roles:
          - anonymous
          - user
          - contributor
          - institution_admin
          - moderator
          - admin
          - system
          permissions:
          - embeds:create:public
          - embeds:create:restricted
        playerCommandRules:
        - command: player.loadManifest
          roles:
          - anonymous
          - user
          - contributor
          - institution_admin
          - moderator
          - admin
          - system
          capability: camera
          permission: playerCommands:loadManifest
        - command: poi.focus
          roles:
          - anonymous
          - user
          - contributor
          - institution_admin
          - moderator
          - admin
          - system
          capability: poi.navigate
          permission: playerCommands:poiNavigate
        - command: animation.seek
          roles:
          - anonymous
          - user
          - contributor
          - institution_admin
          - moderator
          - admin
          - system
          capability: animation
          permission: playerCommands:animation
        - command: annotation.create
          roles:
          - contributor
          - institution_admin
          - moderator
          - admin
          capability: annotations.write
          permission: playerCommands:annotationWrite
        - command: asset.download
          roles:
          - contributor
          - institution_admin
          - moderator
          - admin
          - system
          capability: screenshots
          permission: assets:download
        notes:
        - Роли не зашиваются в плеер; плеер получает вычисленную viewerPolicy в manifest или embed API.
        - Backend применяет RBAC/ABAC по роли, учреждению, правам объекта, статусу публикации и access-политике asset.
        - postMessage команды фильтруются по allowedOrigins и viewerPolicy.commands.
